<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScamY Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const client = supabase.createClient(
  "https://kyfjmaeybpnfoxavtlcz.supabase.co",
  "sb_publishable_PfINMvLfU3t2TWNsSpVkdw_bs2tAqIc"
);
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins';}
body{background:#0a0a0a;color:#e0d4ff;}

header{
background:linear-gradient(90deg,#1a001f,#4b0082);
padding:15px;text-align:center;color:white;font-size:24px;
}

nav{
display:flex;justify-content:center;flex-wrap:wrap;
background:#14001a;padding:10px;
}
nav a{
background:#6a0dad;color:white;margin:6px;
padding:6px 10px;border-radius:6px;text-decoration:none;
}

.container{text-align:center;padding:20px;}

.dashboard{
display:flex;justify-content:center;gap:20px;
flex-wrap:wrap;margin-top:20px;
}

.card{
background:#1a001f;border:1px solid #6a0dad;
padding:20px;border-radius:12px;width:250px;
box-shadow:0 0 15px rgba(138,43,226,0.5);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px #9b30ff;
}

.flow{
display:flex;justify-content:center;
gap:10px;margin-top:20px;
animation:slide 2s infinite alternate;
}

@keyframes slide{
from{transform:translateX(-10px);}
to{transform:translateX(10px);}
}

.lang-switcher{
display:flex;justify-content:center;
gap:10px;background:#0d0014;padding:10px;
}
.lang-btn{
background:#2a003a;color:#c084fc;
border:1px solid #6a0dad;
padding:6px 12px;border-radius:20px;
cursor:pointer;
}
.lang-btn.active{background:#6a0dad;color:white;}

#recentList .card{
text-align:left;font-size:14px;
}

footer{
background:#14001a;
text-align:center;padding:15px;margin-top:30px;
}
</style>
</head>

<body>

<header>ScamY</header>

<nav>
<a href="index.html">Main</a>
<a href="scam.html">Scams</a>
<a href="quiz.html">Quiz</a>
<a href="contact.html">Contact</a>
</nav>

<div class="lang-switcher">
<button class="lang-btn active" onclick="setLang('en',this)">EN</button>
<button class="lang-btn" onclick="setLang('hi',this)">HI</button>
<button class="lang-btn" onclick="setLang('mr',this)">MR</button>
</div>

<div class="container">
<h1 data-key="welcome">Welcome ScamY</h1>
<p data-key="tagline">Scam awareness saves money.</p>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="card">
    <h3>Total Scams</h3>
    <h1 id="totalScams">0</h1>
  </div>

  <div class="card">
    <h3>Total Money Lost</h3>
    <h1 id="totalAmount">₹0</h1>
  </div>
</div>

<!-- FLOW -->
<div class="flow">
  <div>User</div>
  <div>→</div>
  <div>Scam</div>
  <div>→</div>
  <div>Money</div>
</div>

<!-- GRAPH -->
<h2 style="margin-top:30px;">Scam Analytics</h2>
<canvas id="scamChart" height="100"></canvas>

<!-- RECENT -->
<h2 style="margin-top:30px;">Recent Reports</h2>
<div id="recentList" class="dashboard"></div>

</div>

<footer>© 2026 ScamY 🚨 Stay Safe</footer>

<script>
// ANIMATION
function animateValue(id,start,end,duration,prefix=""){
let current=start;
let increment=end/(duration/20);

let timer=setInterval(()=>{
current+=increment;
if(current>=end){current=end;clearInterval(timer);}
document.getElementById(id).innerText=prefix+Math.floor(current);
},20);
}

let chart;

// LOAD DATA
async function loadDashboard(){

const {data,error}=await client.from("scams").select("*");

if(error){console.log(error);return;}

let total=data.length;
let amount=0;

let types={"UPI Scam":0,"OTP Scam":0,"Call Scam":0};

data.forEach(r=>{
amount+=r.amount;
if(types[r.scam_type]!=undefined) types[r.scam_type]++;
});

// COUNTERS
animateValue("totalScams",0,total,1000);
animateValue("totalAmount",0,amount,1000,"₹");

// GRAPH
const ctx=document.getElementById("scamChart").getContext("2d");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(types),
datasets:[{
label:"Scams",
data:Object.values(types)
}]
}
});

// RECENT
const list=document.getElementById("recentList");
list.innerHTML="";

data.slice(-5).reverse().forEach(item=>{
list.innerHTML+=`
<div class="card">
<b>${item.name}</b><br>
₹${item.amount}<br>
${item.scam_type}
</div>`;
});
}

// AUTO REFRESH
setInterval(loadDashboard,5000);
loadDashboard();

// LANGUAGE
const translations={
en:{welcome:"Welcome ScamY",tagline:"Scam awareness saves money."},
hi:{welcome:"ScamY में स्वागत है",tagline:"जागरूकता पैसे बचाती है"},
mr:{welcome:"ScamY मध्ये स्वागत आहे",tagline:"जागरूकता पैसे वाचवते"}
};

function setLang(lang,btn){
const t=translations[lang];
document.querySelectorAll('[data-key]').forEach(el=>{
let key=el.getAttribute('data-key');
if(t[key]) el.textContent=t[key];
});
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}
</script>

</body>
</html>
