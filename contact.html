<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <title>Contact</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-color: #0a0a0a;
      color: #e0d4ff;
    }

    h1, h2, h3 {
      color: #c084fc;
      text-shadow: 0 0 5px #9b30ff, 0 0 10px #6a0dad, 0 0 15px #9b30ff;
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 100% { opacity: 1; }
      20%, 22% { opacity: 0.7; }
    }

    header {
      background: linear-gradient(90deg, #1a001f, #4b0082);
      padding: 20px;
      text-align: center;
      font-size: 26px;
      font-weight: 600;
      color: white;
    }

    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      background-color: #14001a;
      padding: 10px;
    }

    nav a {
      color: #c084fc;
      text-decoration: none;
      margin: 8px 12px;
      font-weight: bold;
    }

    nav a:hover {
      color: white;
    }

    .container {
      padding: 30px 20px;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
      animation: fadeIn 1s ease-in;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #6a0dad;
      background-color: #1a001f;
      color: #e0d4ff;
      font-size: 16px;
      transition: 0.3s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #9b30ff;
      box-shadow: 0 0 10px #9b30ff;
    }

    button {
      background-color: #6a0dad;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #9b30ff;
    }

    footer {
      background-color: #14001a;
      text-align: center;
      padding: 15px;
      margin-top: 30px;
      color: #aaa;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      width: 250px;
      background: #111;
      color: white;
      border-radius: 10px;
      overflow: hidden;
      padding: 15px;
      margin: 20px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 20px #9b30ff;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      margin-bottom: 15px;
    }

    /* Language Switcher - only addition */
    .lang-switcher {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      background-color: #0d0014;
      flex-wrap: wrap;
    }

    .lang-btn {
      background: #2a003a;
      color: #c084fc;
      border: 1px solid #6a0dad;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s;
    }

    .lang-btn:hover, .lang-btn.active {
      background: #6a0dad;
      color: white;
      box-shadow: 0 0 10px #9b30ff;
    }
  </style>
</head>

<body>

<header data-key="header">Contact</header>

<nav>
  <a data-key="nav_main" href="index.html">Main</a>

</nav>

<!-- Language Switcher -->
<div class="lang-switcher">
  <button class="lang-btn active" onclick="setLang('en', this)">🇬🇧 English</button>
  <button class="lang-btn" onclick="setLang('hi', this)">🇮🇳 हिन्दी</button>
  <button class="lang-btn" onclick="setLang('mr', this)">🇮🇳 मराठी</button>
</div>

<div class="container">
  <h1 data-key="contact_heading">Contact Us</h1>

  <!-- GOOGLE FORM CONNECTED -->
 <form id="scamForm">
  <input type="text" id="name" placeholder="Name" required>
  <input type="number" id="amount" placeholder="Amount Lost" required>
  
  <select id="type">
    <option>UPI Scam</option>
    <option>OTP Scam</option>
    <option>Call Scam</option>
  </select>

  <button type="submit">Submit</button>
</form>

<script>
document.getElementById("scamForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const amount = document.getElementById("amount").value;
  const type = document.getElementById("type").value;

  const { error } = await supabase
    .from("scams")
    .insert([{ name, amount, scam_type: type }]);

  if (error) {
    alert("Error saving data");
  } else {
    alert("Data saved!");
  }
});
</script>
  <!-- HIDDEN IFRAME -->

  <script>
    let submitted = false;
    window.onload = function () {
      if (submitted) {
        alert("Message sent successfully!");
      }
    }
  </script>

</div>

<div class="card-container">
  <div class="card">
    <img src="money.png" alt="Card Image">
    <h3 align="center" data-key="helpline_title">helpline no</h3>
    <p align="center">1930</p>
  </div>
</div>

<footer>
  © 2026 Scam Awareness | Stay Smart 🚨
</footer>

<script>
  const translations = {
    en: {
      header: "Contact",
      nav_main: "Main", nav_scams: "Scams", nav_quiz: "Quiz", nav_contact: "Contact",
      contact_heading: "Contact Us",
      input_name: "Your Name",
      input_email: "Your Email",
      input_message: "Your Message",
      send_btn: "Send",
      helpline_title: "helpline no"
    },
    hi: {
      header: "संपर्क",
      nav_main: "मुख्य", nav_scams: "घोटाले", nav_quiz: "क्विज़", nav_contact: "संपर्क",
      contact_heading: "हमसे संपर्क करें",
      input_name: "आपका नाम",
      input_email: "आपका ईमेल",
      input_message: "आपका संदेश",
      send_btn: "भेजें",
      helpline_title: "हेल्पलाइन नंबर"
    },
    mr: {
      header: "संपर्क",
      nav_main: "मुख्य", nav_scams: "फसवणूक", nav_quiz: "प्रश्नमंजुषा", nav_contact: "संपर्क",
      contact_heading: "आमच्याशी संपर्क करा",
      input_name: "तुमचे नाव",
      input_email: "तुमचा ईमेल",
      input_message: "तुमचा संदेश",
      send_btn: "पाठवा",
      helpline_title: "हेल्पलाइन नंबर"
    }
  };

  function setLang(lang, btn) {
    const t = translations[lang];
    if (!t) return;

    document.querySelectorAll('[data-key]').forEach(el => {
      const key = el.getAttribute('data-key');
      if (t[key] !== undefined) el.textContent = t[key];
    });

    document.getElementById('input_name').placeholder = t.input_name;
    document.getElementById('input_email').placeholder = t.input_email;
    document.getElementById('input_message').placeholder = t.input_message;

    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.documentElement.lang = lang;
  }
</script>

</body>
</html>
