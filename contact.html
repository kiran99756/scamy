<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const client = supabase.createClient(
      "https://kyfjmaeybpnfoxavtlcz.supabase.co",
      "sb_publishable_PfINMvLfU3t2TWNsSpVkdw_bs2tAqIc"
    );
  </script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body { background:#0a0a0a; color:#e0d4ff; }

    header {
      background: linear-gradient(90deg, #1a001f, #4b0082);
      padding:20px; text-align:center; font-size:26px; color:white;
    }

    nav {
      display:flex; justify-content:center; flex-wrap:wrap;
      background:#14001a; padding:10px;
    }
    nav a { color:#c084fc; margin:8px; text-decoration:none; }

    .lang-switcher {
      display:flex; justify-content:center; gap:10px;
      padding:10px; background:#0d0014;
    }

    .lang-btn {
      background:#2a003a; color:#c084fc;
      border:1px solid #6a0dad;
      padding:6px 16px; border-radius:20px;
      cursor:pointer;
    }

    .lang-btn.active {
      background:#6a0dad; color:white;
    }

    .container {
      padding:30px; max-width:600px;
      margin:auto; text-align:center;
    }

    input, select {
      width:100%; padding:12px; margin:10px 0;
      border-radius:10px; border:1px solid #6a0dad;
      background:#1a001f; color:#fff;
    }

    button {
      background:#6a0dad; color:white;
      padding:12px; border:none;
      border-radius:10px; cursor:pointer;
    }

    button:hover {
      transform:scale(1.05);
      box-shadow:0 0 10px #9b30ff;
    }

    .card-container {
      display:flex; justify-content:center;
    }

    .card {
      width:250px; background:#111;
      border-radius:10px; padding:15px;
      margin:20px; text-align:center;
    }

    footer {
      background:#14001a;
      text-align:center; padding:15px;
      color:#aaa;
    }
  </style>
</head>

<body>

<header data-key="header">Contact</header>

<nav>
  <a data-key="nav_main" href="index.html">Main</a>
  <a data-key="nav_scams" href="scam.html">Scams</a>
  <a data-key="nav_quiz" href="quiz.html">Quiz</a>
  <a data-key="nav_contact" href="contact.html">Contact</a>
</nav>

<div class="lang-switcher">
  <button class="lang-btn active" onclick="setLang('en', this)">English</button>
  <button class="lang-btn" onclick="setLang('hi', this)">हिन्दी</button>
  <button class="lang-btn" onclick="setLang('mr', this)">मराठी</button>
</div>

<div class="container">
  <h1 data-key="contact_heading">Contact Us</h1>

  <form id="scamForm">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="number" id="amount" placeholder="Amount Lost" required>

    <select id="type">
      <option>UPI Scam</option>
      <option>OTP Scam</option>
      <option>Call Scam</option>
    </select>

    <button type="submit">Submit</button>
  </form>
</div>

<div class="card-container">
  <div class="card">
    <h3 data-key="helpline_title">Helpline No</h3>
    <p>1930</p>
  </div>
</div>

<footer>
  © 2026 Scam Awareness | Stay Smart 🚨
</footer>

<script>
// SAVE DATA
document.getElementById("scamForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const amount = parseInt(document.getElementById("amount").value);
  const type = document.getElementById("type").value;

  // Check customer
let { data: existing } = await client
  .from("customers")
  .select("*")
  .eq("name", name)
  .maybeSingle();

let customer_id;

if (existing) {
  customer_id = existing.id;
} else {
  const { data, error } = await client
    .from("customers")
    .insert([{ name }])
    .select()
    .single();

  if (error) {
    console.error(error);
    alert("Error saving customer");
    return;
  }

  customer_id = data.id;
}

  // Insert transaction
  const { error } = await client
    .from("transactions")
    .insert([{
      customer_id,
      amount,
      scam_type: type
    }]);

  if (error) {
    alert("❌ Error saving data");
  } else {
    alert("✅ Data saved!");
    document.getElementById("scamForm").reset();
  }
});
  
// LANGUAGE
const translations = {
  en: { header:"Contact", contact_heading:"Contact Us", helpline_title:"Helpline No" },
  hi: { header:"संपर्क", contact_heading:"हमसे संपर्क करें", helpline_title:"हेल्पलाइन नंबर" },
  mr: { header:"संपर्क", contact_heading:"आमच्याशी संपर्क करा", helpline_title:"हेल्पलाइन नंबर" }
};

function setLang(lang, btn) {
  const t = translations[lang];
  document.querySelectorAll('[data-key]').forEach(el => {
    const key = el.getAttribute('data-key');
    if (t[key]) el.textContent = t[key];
  });

  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
</script>

</body>
</html>
